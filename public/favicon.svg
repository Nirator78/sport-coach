<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48">
  <title>Home Workout</title>
  <defs>
    <linearGradient id="pg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#a3e635"/>
      <stop offset="30%"  stop-color="#4ade80"/>
      <stop offset="70%"  stop-color="#166534"/>
      <stop offset="100%" stop-color="#14532d"/>
    </linearGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#f1f5f9"/>
      <stop offset="50%"  stop-color="#94a3b8"/>
      <stop offset="100%" stop-color="#475569"/>
    </linearGradient>
  </defs>
  <!-- Dumbbell tilted +5° like the logo -->
  <g transform="translate(24,24) rotate(5) translate(-24,-24)">
    <!-- Bar (behind plates) -->
    <rect x="18" y="22" width="12" height="5" rx="2.5" fill="url(#bg)"/>
    <!-- Left plate -->
    <rect x="6"  y="14" width="12" height="20" rx="5" fill="url(#pg)"/>
    <ellipse cx="10" cy="18" rx="2" ry="4" fill="white" opacity="0.25"/>
    <!-- Right plate -->
    <rect x="30" y="14" width="12" height="20" rx="5" fill="url(#pg)"/>
    <ellipse cx="34" cy="18" rx="2" ry="4" fill="white" opacity="0.25"/>
  </g>
</svg>
