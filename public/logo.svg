<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <title>Home Workout</title>
  <defs>
    <linearGradient id="pg_o" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#a3e635"/>
      <stop offset="22%"  stop-color="#4ade80"/>
      <stop offset="58%"  stop-color="#166534"/>
      <stop offset="100%" stop-color="#14532d"/>
    </linearGradient>
    <linearGradient id="pg_m" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#86efac"/>
      <stop offset="25%"  stop-color="#22c55e"/>
      <stop offset="62%"  stop-color="#15803d"/>
      <stop offset="100%" stop-color="#166534"/>
    </linearGradient>
    <linearGradient id="pg_i" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#bbf7d0"/>
      <stop offset="30%"  stop-color="#4ade80"/>
      <stop offset="65%"  stop-color="#16a34a"/>
      <stop offset="100%" stop-color="#15803d"/>
    </linearGradient>
    <linearGradient id="col_g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#14532d"/>
    </linearGradient>
    <linearGradient id="bar_g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#f1f5f9"/>
      <stop offset="35%"  stop-color="#cbd5e1"/>
      <stop offset="70%"  stop-color="#94a3b8"/>
      <stop offset="100%" stop-color="#475569"/>
    </linearGradient>
  </defs>

  <!-- Dumbbell, tilted +5° (left lower, right higher, like reference) -->
  <g transform="translate(100,100) rotate(5) translate(-100,-100)">

    <!-- LEFT OUTER PLATE -->
    <rect x="14" y="64" width="18" height="72" rx="7" fill="url(#pg_o)"/>
    <ellipse cx="19" cy="76" rx="4" ry="9" fill="white" opacity="0.22"/>

    <!-- LEFT MID PLATE -->
    <rect x="32" y="71" width="15" height="58" rx="6" fill="url(#pg_m)"/>
    <ellipse cx="36.5" cy="81" rx="3" ry="7" fill="white" opacity="0.28"/>

    <!-- LEFT INNER PLATE -->
    <rect x="47" y="78" width="11" height="44" rx="5" fill="url(#pg_i)"/>
    <ellipse cx="51" cy="86" rx="2" ry="5" fill="white" opacity="0.35"/>

    <!-- LEFT COLLAR -->
    <rect x="58" y="87" width="6" height="26" rx="3" fill="url(#col_g)"/>

    <!-- BAR -->
    <rect x="64" y="92" width="72" height="16" rx="6" fill="url(#bar_g)"/>
    <line x1="76"  y1="93" x2="76"  y2="107" stroke="#94a3b8" stroke-width="1" opacity="0.45"/>
    <line x1="84"  y1="93" x2="84"  y2="107" stroke="#94a3b8" stroke-width="1" opacity="0.45"/>
    <line x1="92"  y1="93" x2="92"  y2="107" stroke="#94a3b8" stroke-width="1" opacity="0.45"/>
    <line x1="100" y1="93" x2="100" y2="107" stroke="#94a3b8" stroke-width="1" opacity="0.45"/>
    <line x1="108" y1="93" x2="108" y2="107" stroke="#94a3b8" stroke-width="1" opacity="0.45"/>
    <line x1="116" y1="93" x2="116" y2="107" stroke="#94a3b8" stroke-width="1" opacity="0.45"/>
    <line x1="124" y1="93" x2="124" y2="107" stroke="#94a3b8" stroke-width="1" opacity="0.45"/>
    <!-- Bar top shine -->
    <rect x="67" y="93" width="66" height="4" rx="2" fill="white" opacity="0.3"/>

    <!-- RIGHT COLLAR -->
    <rect x="136" y="87" width="6" height="26" rx="3" fill="url(#col_g)"/>

    <!-- RIGHT INNER PLATE -->
    <rect x="142" y="78" width="11" height="44" rx="5" fill="url(#pg_i)"/>
    <ellipse cx="147" cy="86" rx="2" ry="5" fill="white" opacity="0.35"/>

    <!-- RIGHT MID PLATE -->
    <rect x="153" y="71" width="15" height="58" rx="6" fill="url(#pg_m)"/>
    <ellipse cx="157.5" cy="81" rx="3" ry="7" fill="white" opacity="0.28"/>

    <!-- RIGHT OUTER PLATE -->
    <rect x="168" y="64" width="18" height="72" rx="7" fill="url(#pg_o)"/>
    <ellipse cx="173" cy="76" rx="4" ry="9" fill="white" opacity="0.22"/>

  </g>

  <!-- Sparkle star (large) top right -->
  <g transform="translate(163,38)">
    <path d="M0,-9 L2,-2 L9,0 L2,2 L0,9 L-2,2 L-9,0 L-2,-2 Z" fill="#4ade80"/>
  </g>
  <!-- Sparkle star (small) -->
  <g transform="translate(178,54)">
    <path d="M0,-5.5 L1.2,-1.2 L5.5,0 L1.2,1.2 L0,5.5 L-1.2,1.2 L-5.5,0 L-1.2,-1.2 Z" fill="#86efac"/>
  </g>
  <!-- Tiny dots -->
  <circle cx="154" cy="48" r="2.5" fill="#4ade80"/>
  <circle cx="184" cy="43" r="1.8" fill="#a3e635"/>
  <circle cx="170" cy="30" r="1.4" fill="#86efac"/>
</svg>
